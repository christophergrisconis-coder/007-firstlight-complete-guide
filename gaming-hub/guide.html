<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Guide | Arcadia Grid</title>
    <link rel="stylesheet" href="./assets/css/styles.css" />
  </head>
  <body data-page="guide">
    <main class="container page-layout">
      <section class="panel" id="guide-shell">
        <p class="eyebrow">Walkthrough</p>
        <h1 id="guide-title">Loading guide...</h1>
        <p id="guide-description" class="form-note"></p>
      </section>

      <section class="panel" id="guide-meta"></section>

      <section class="guide-layout">
        <section class="panel quest-nav-panel">
          <div class="quest-head">
            <h2>Quest Navigator</h2>
            <div class="quest-nav-buttons">
              <button class="btn btn-secondary" id="quest-prev" type="button">Previous Quest</button>
              <button class="btn btn-secondary" id="quest-next" type="button">Next Quest</button>
            </div>
          </div>
          <div id="quest-list" class="quest-list"></div>
          <p id="guide-access-note" class="form-note"></p>

        </section>

        <section class="panel" id="quest-detail-shell">
          <p class="eyebrow">Selected Quest</p>
          <h2 id="quest-title">Select a quest</h2>
          <p id="quest-summary" class="form-note"></p>

          <div id="quest-custom-shell" class="hidden">
            <p class="form-note">
              This quest has a dedicated hosted guide experience. Text fallback is intentionally disabled.
            </p>
            <a class="btn btn-accent" id="quest-custom-link" href="#" target="_blank" rel="noopener noreferrer">Open Hosted Quest Guide</a>
          </div>

          <div id="quest-text-shell" class="hidden">
            <div class="quest-controls">
              <button class="btn btn-secondary" id="step-prev" type="button">Previous Step</button>
              <button class="btn btn-secondary" id="step-next" type="button">Next Step</button>
              <button class="btn btn-secondary" id="quest-toggle-expand" type="button">Collapse Sections</button>
              <button class="btn btn-accent" id="quest-toggle-complete" type="button">Mark Complete</button>
            </div>
            <p id="quest-progress-note" class="form-note"></p>
            <ol id="quest-steps" class="guide-list guide-step-list"></ol>
            <p id="quest-outcome" class="form-note"></p>
            <div>
              <h3>Context Sources</h3>
              <ul id="quest-media" class="guide-list"></ul>
            </div>
          </div>

          <p id="quest-save-note" class="form-note"></p>
        </section>
      </section>

      <a class="btn btn-secondary" href="./pages/games.html">Back To Games</a>
    </main>

    <script type="module">
      import("./guide-page.js").catch(() => import("./assets/js/guide-page.js"));
    </script>
  </body>
</html>
