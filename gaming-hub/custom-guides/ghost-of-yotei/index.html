<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ghost of Yotei Guide</title>
    <style>
      :root {
        --bg: #0f141b;
        --panel: #151b23;
        --line: rgba(255, 255, 255, 0.12);
        --text: #f4f7fb;
        --muted: #aab4c0;
        --accent: #42d6c5;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: "Manrope", "Segoe UI", sans-serif;
        color: var(--text);
        background:
          radial-gradient(circle at 14% 8%, rgba(66, 214, 197, 0.16), transparent 36%),
          linear-gradient(180deg, #10151d 0%, #141a22 100%);
      }
      .wrap {
        width: min(1080px, 94vw);
        margin: 28px auto 56px;
        display: grid;
        gap: 14px;
      }
      .panel {
        background: rgba(21, 27, 35, 0.92);
        border: 1px solid var(--line);
        border-radius: 12px;
        padding: 16px;
      }
      .eyebrow {
        margin: 0;
        color: var(--accent);
        letter-spacing: 0.18rem;
        text-transform: uppercase;
        font-size: 0.78rem;
      }
      h1, h2 { margin: 0 0 8px; }
      p { margin: 0; color: #d8e2ef; }
      .toolbar {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 10px;
      }
      input {
        width: 100%;
        border: 1px solid var(--line);
        background: #1b232e;
        color: var(--text);
        border-radius: 10px;
        padding: 10px;
      }
      .btn {
        border: 1px solid var(--line);
        background: linear-gradient(135deg, #42d6c5 0%, #ff9d5a 100%);
        color: #11161c;
        border-radius: 10px;
        padding: 10px 14px;
        text-decoration: none;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        font-weight: 700;
      }
      .layout {
        display: grid;
        grid-template-columns: minmax(280px, 0.9fr) minmax(0, 1.4fr);
        gap: 14px;
      }
      .list {
        max-height: 70vh;
        overflow: auto;
        display: grid;
        gap: 8px;
      }
      .item {
        width: 100%;
        text-align: left;
        border: 1px solid var(--line);
        background: #18212c;
        color: var(--text);
        border-radius: 10px;
        padding: 10px 12px;
        cursor: pointer;
      }
      .item.active {
        border-color: rgba(66, 214, 197, 0.6);
        box-shadow: 0 0 0 1px rgba(66, 214, 197, 0.3) inset;
      }
      ul {
        margin: 0;
        padding-left: 18px;
        display: grid;
        gap: 8px;
      }
      li {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #141d28;
        padding: 8px 10px;
      }
      .muted { color: var(--muted); }
      @media (max-width: 940px) {
        .layout { grid-template-columns: 1fr; }
      }
    </style>
  </head>
  <body>
    <main class="wrap">
      <section class="panel">
        <p class="eyebrow">Hosted Custom Guide</p>
        <h1>Ghost of Yotei Completion Tracker</h1>
        <p>Directly hosted on questandguides.com. No Perplexity redirect.</p>
      </section>

      <section class="panel toolbar">
        <input id="search" type="search" placeholder="Search quests, steps, or outcomes..." />
        <a class="btn" href="/gaming-hub/pages/games.html">Back To Games</a>
      </section>

      <section class="layout">
        <section class="panel">
          <h2>Quest List</h2>
          <div id="quest-list" class="list"></div>
        </section>

        <section class="panel">
          <h2 id="quest-title">Select a quest</h2>
          <p id="quest-summary" class="muted"></p>
          <h3>Steps</h3>
          <ul id="quest-steps"></ul>
          <p id="quest-outcome" class="muted" style="margin-top:10px;"></p>
        </section>
      </section>
    </main>

    <script>
      const quests = [
        {
          title: "The Snake",
          summary: "Prologue mission establishing Atsu's revenge arc and core combat fundamentals.",
          steps: [
            "Witness the attack on Kasabe village and regroup.",
            "Clear the house assault waves and survive the fire route.",
            "Duel The Snake and learn parry and dodge timing.",
            "Follow Jubei through the homestead memory sequence.",
          ],
          outcome: "Spyglass, opening gear unlocks, and Resolve upgrade.",
        },
        {
          title: "Belly of the Beast",
          summary: "Infiltrate the Yotei Six garrison and extract a key informant.",
          steps: [
            "Scout the Ishikari garrison with Spyglass markers.",
            "Infiltrate and free the prisoner without raising alarm.",
            "Escort the informant to safety through pursuit waves.",
          ],
          outcome: "Rider's Edge (Tier 2 katana), currency, and technique points.",
        },
        {
          title: "A Mad Pursuit",
          summary: "Mounted pursuit mission to intercept a Yotei Six messenger.",
          steps: [
            "Ride south and engage escort riders on the move.",
            "Isolate the messenger and recover the sealed letter.",
            "Return to base and decode strategic intelligence.",
          ],
          outcome: "Horse barding upgrade and progression currency.",
        },
        {
          title: "The Yotei Six",
          summary: "Identify all major lieutenants and trigger Act-level hunt routes.",
          steps: [
            "Meet the contact and collect the updated dossier.",
            "Confirm identities and track The Widow's movement.",
            "Lock in target order for regional progression.",
          ],
          outcome: "Ghost Armour Tier I and additional technique points.",
        },
        {
          title: "The Oni",
          summary: "Heavy duel featuring timing-based punish windows against a brute archetype.",
          steps: [
            "Clear the temple approach and secure the arena.",
            "Phase 1: parry overhead chains and punish recovery.",
            "Phase 2: dodge charge attacks and finish execution window.",
          ],
          outcome: "Oni's Resolve charm and major combat progression.",
        },
        {
          title: "The Kitsune",
          summary: "Illusion-focused boss chapter with puzzle and mirror mechanics.",
          steps: [
            "Enter spirit gate and clear decoy encounters.",
            "Solve lantern puzzle to break illusion layer.",
            "Defeat true Kitsune in rapid burst phase.",
          ],
          outcome: "Kitsune mask cosmetic and key progression unlock.",
        },
        {
          title: "Ryuhei the Enforcer",
          summary: "Prison liberation arc followed by multi-phase spear boss encounter.",
          steps: [
            "Infiltrate camp and free all prisoner groups.",
            "Reach command tower and start boss duel.",
            "Manage adds during Phase 2 and close in berserk phase.",
          ],
          outcome: "Ryuhei spear collectible and fast travel unlock.",
        },
        {
          title: "The Dragon",
          summary: "Final summit battle requiring full toolkit mastery across four phases.",
          steps: [
            "Ascend to Teshio summit and prepare resources.",
            "Cycle stance strategy across precision and armor phases.",
            "Survive hazard phase and complete final parry sequence.",
          ],
          outcome: "Endgame weapon tier, completion pathway, and ending unlock.",
        },
        {
          title: "The Farmer and the Fox",
          summary: "Early side tale focused on environmental investigation and village defense.",
          steps: [
            "Follow tracks from the damaged harvest field.",
            "Locate displaced fox den and investigate cause.",
            "Defeat the burn patrol threatening the area.",
          ],
          outcome: "Harvest charm and side-route progression reward.",
        },
        {
          title: "Silk and Ash",
          summary: "Recovery side mission revealing contraband maps tied to lieutenant operations.",
          steps: [
            "Scout the camp and recover three marked silk bales.",
            "Inspect hidden map compartment evidence.",
            "Deliver map intel to resistance contact.",
          ],
          outcome: "Crafting material and regional intel advancement.",
        },
        {
          title: "A Good Death",
          summary: "Honor narrative quest centered on a retired samurai's final stand.",
          steps: [
            "Hear final request and prepare ceremonial setup.",
            "Escort to duel site and manage encounter integrity.",
            "Resolve finale according to honor outcome.",
          ],
          outcome: "Rare forging material and story reputation gain.",
        },
        {
          title: "The Lighthouse Keeper",
          summary: "Stealth rescue mission with sabotage objective and timed extraction.",
          steps: [
            "Scale cliffs and secure lower storage rescue target.",
            "Disable lighthouse signal mechanism in upper chamber.",
            "Escape before supply confirmation arrives.",
          ],
          outcome: "Coastal route control and tactical navigation advantage.",
        },
      ];

      const listNode = document.querySelector("#quest-list");
      const titleNode = document.querySelector("#quest-title");
      const summaryNode = document.querySelector("#quest-summary");
      const stepsNode = document.querySelector("#quest-steps");
      const outcomeNode = document.querySelector("#quest-outcome");
      const searchNode = document.querySelector("#search");

      let filtered = quests;
      let activeIndex = 0;

      const renderDetail = () => {
        const quest = filtered[activeIndex];
        if (!quest) {
          titleNode.textContent = "No matching quests";
          summaryNode.textContent = "Try a different search.";
          stepsNode.innerHTML = "";
          outcomeNode.textContent = "";
          return;
        }
        titleNode.textContent = quest.title;
        summaryNode.textContent = quest.summary || "Detailed quest breakdown.";
        stepsNode.innerHTML = quest.steps.map((step) => `<li>${step}</li>`).join("");
        outcomeNode.textContent = quest.outcome ? `Outcome: ${quest.outcome}` : "";
      };

      const renderList = () => {
        listNode.innerHTML = filtered
          .map(
            (q, index) =>
              `<button class="item ${index === activeIndex ? "active" : ""}" data-index="${index}">${q.title}</button>`
          )
          .join("");
      };

      listNode.addEventListener("click", (event) => {
        const target = event.target.closest("[data-index]");
        if (!target) return;
        activeIndex = Number.parseInt(target.getAttribute("data-index") || "0", 10);
        renderList();
        renderDetail();
      });

      searchNode.addEventListener("input", () => {
        const q = searchNode.value.trim().toLowerCase();
        if (!q) {
          filtered = quests;
        } else {
          filtered = quests.filter((quest) => {
            const hay = `${quest.title} ${quest.summary} ${(quest.steps || []).join(" ")} ${quest.outcome}`.toLowerCase();
            return hay.includes(q);
          });
        }
        activeIndex = 0;
        renderList();
        renderDetail();
      });

      renderList();
      renderDetail();
    </script>
  </body>
</html>
